# Netlify Configuration with Security Headers
# This file enables security headers on Netlify deployment

[build]
  command = "echo 'No build needed for static site'"
  publish = "."

# Redirect HTTP to HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Security Headers for all pages
[[headers]]
  for = "/*"
  
  [headers.values]
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://formspree.io; frame-ancestors 'self'; form-action 'self' https://formspree.io; base-uri 'self'; object-src 'none'; media-src 'none'; frame-src 'none';"
    
    # X-Content-Type-Options - Prevents MIME sniffing
    X-Content-Type-Options = "nosniff"
    
    # X-Frame-Options - Prevents clickjacking
    X-Frame-Options = "SAMEORIGIN"
    
    # Referrer-Policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # X-XSS-Protection - Legacy browser support
    X-XSS-Protection = "1; mode=block"
    
    # Permissions-Policy
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    
    # Expect-CT - Certificate Transparency
    Expect-CT = "max-age=86400, enforce"
    
    # Strict-Transport-Security - HTTPS enforcement
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Security headers for HTML files specifically
[[headers]]
  for = "/*.html"
  
  [headers.values]
    Content-Type = "text/html; charset=utf-8"
    Cache-Control = "public, max-age=3600, must-revalidate"

# Cache control for assets (long-term caching)
[[headers]]
  for = "/assets/*"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache control for static assets
[[headers]]
  for = "/*.{js,css,jpg,jpeg,png,gif,ico,svg,woff,woff2,ttf,eot}"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Deny access to sensitive files
[[headers]]
  for = "/*.{env,json,lock,yml,yaml,git,htaccess,bak,backup,sql,db}"
  
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options = "nosniff"
