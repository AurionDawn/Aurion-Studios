<?xml version="1.0" encoding="UTF-8"?>
<configuration>
  <system.webServer>
    <!-- Remove server identification headers -->
    <httpProtocol>
      <customHeaders>
        <remove name="X-Powered-By" />
        <remove name="X-AspNet-Version" />
        <remove name="X-AspNetMvc-Version" />
        <remove name="Server" />
        
        <!-- Content-Security-Policy -->
        <add name="Content-Security-Policy" value="default-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https://formspree.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://formspree.io; img-src 'self' data:; object-src 'none'; upgrade-insecure-requests;" />
        
        <!-- X-Content-Type-Options -->
        <add name="X-Content-Type-Options" value="nosniff" />
        
        <!-- X-Frame-Options (Clickjacking protection) -->
        <add name="X-Frame-Options" value="DENY" />
        
        <!-- Referrer-Policy -->
        <add name="Referrer-Policy" value="strict-origin-when-cross-origin" />
        
        <!-- X-XSS-Protection -->
        <add name="X-XSS-Protection" value="1; mode=block" />
        
        <!-- Permissions-Policy -->
        <add name="Permissions-Policy" value="camera=(), microphone=(), geolocation=(), payment=()" />
        
        <!-- Strict-Transport-Security (enable when HTTPS is configured) -->
        <!-- <add name="Strict-Transport-Security" value="max-age=31536000; includeSubDomains; preload" /> -->
      </customHeaders>
    </httpProtocol>

    <!-- Deny access to sensitive files -->
    <security>
      <requestFiltering>
        <hiddenSegments>
          <add segment=".env" />
          <add segment=".git" />
          <add segment="web.config" />
          <add segment=".htaccess" />
        </hiddenSegments>
        <fileExtensions>
          <add fileExtension=".env" allowed="false" />
          <add fileExtension=".bak" allowed="false" />
          <add fileExtension=".backup" allowed="false" />
          <add fileExtension=".sql" allowed="false" />
        </fileExtensions>
      </requestFiltering>
    </security>

    <!-- Remove version information -->
    <security>
      <requestFiltering removeServerHeader="true" />
    </security>

    <!-- Enable compression -->
    <urlCompression doStaticCompression="true" doDynamicCompression="true" />

    <!-- Set charset -->
    <staticContent>
      <mimeMap fileExtension=".html" mimeType="text/html; charset=utf-8" />
      <clientCache cacheControlMode="UseMaxAge" cacheControlMaxAgeInSeconds="3600" />
    </staticContent>

    <!-- Cache rules for static assets -->
    <caching>
      <profiles>
        <add extension=".js" policy="CacheUntilChange" kernelCachePolicy="CacheUntilChange" />
        <add extension=".css" policy="CacheUntilChange" kernelCachePolicy="CacheUntilChange" />
        <add extension=".jpg" policy="CacheUntilChange" kernelCachePolicy="CacheUntilChange" />
        <add extension=".jpeg" policy="CacheUntilChange" kernelCachePolicy="CacheUntilChange" />
        <add extension=".png" policy="CacheUntilChange" kernelCachePolicy="CacheUntilChange" />
      </profiles>
    </caching>
  </system.webServer>
</configuration>
