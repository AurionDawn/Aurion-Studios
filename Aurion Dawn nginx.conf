# Nginx Security Headers Configuration
# Add this to your nginx server block configuration

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP to HTTPS (uncomment when HTTPS is configured)
    # return 301 https://$server_name$request_uri;

    root /var/www/html;
    index index.html;

    # ── HIDE SERVER INFORMATION ──
    server_tokens off;
    
    # Remove or obfuscate server header
    proxy_hide_header "Server";
    add_header Server "" always;

    # ── CONTENT SECURITY POLICY ──
    add_header Content-Security-Policy "default-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https://formspree.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://formspree.io; img-src 'self' data:; object-src 'none'; upgrade-insecure-requests;" always;

    # ── X-CONTENT-TYPE-OPTIONS ──
    add_header X-Content-Type-Options "nosniff" always;

    # ── X-FRAME-OPTIONS (Clickjacking Protection) ──
    add_header X-Frame-Options "DENY" always;

    # ── REFERRER-POLICY ──
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── X-XSS-PROTECTION ──
    add_header X-XSS-Protection "1; mode=block" always;

    # ── PERMISSIONS-POLICY ──
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── STRICT-TRANSPORT-SECURITY (Enable when HTTPS is configured) ──
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── DISABLE DIRECTORY LISTING ──
    autoindex off;

    # ── DENY ACCESS TO SENSITIVE FILES ──
    location ~ /\. {
        deny all;
    }

    location ~ /\.(env|bak|backup|sql|db|git|htaccess|yml|yaml|json|lock)$ {
        deny all;
    }

    # ── CACHING FOR STATIC ASSETS ──
    location ~* \.(js|css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── CACHE CONTROL FOR HTML ──
    location ~* \.html?$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── GZIP COMPRESSION ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── DEFAULT LOCATION ──
    location / {
        try_files $uri $uri/ =404;
    }

    # ── FORCE CHARSET ──
    charset utf-8;
}

